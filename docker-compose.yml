version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cuartoya_user
      POSTGRES_PASSWORD: cuartoya_pass
      POSTGRES_DB: cuartoya_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build: ./web
    ports:
      - "5173:5173"
    env_file: ./web/.env
    volumes:
      - ./web:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
